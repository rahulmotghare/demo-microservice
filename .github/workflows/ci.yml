name: CI Pipeline

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Make Maven Wrapper Executable
        run: chmod +x mvnw

      - name: Build Spring Boot Application
        run: ./mvnw clean package

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/demo-microservice:${{ github.run_number }} \
            -t ghcr.io/${{ github.repository_owner }}/demo-microservice:latest .

      - name: Push Docker Image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/demo-microservice:${{ github.run_number }}
          docker push ghcr.io/${{ github.repository_owner }}/demo-microservice:latest
      
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
      
      - name: Clone GitOps Repository
        run: |
          git clone https://x-access-token:${{ secrets.GITOPS_PAT }}@github.com/rahulmotghare/platform-gitops.git
          cd platform-gitops
          git remote -v

      - name: Update Helm Values
        run: |
          cd platform-gitops/charts/demo-microservice

          sed -i.bak 's/tag:.*/tag: "${{ github.run_number }}"/' values.yaml

          rm values.yaml.bak

      - name: Commit and Push GitOps Changes
        run: |
          cd platform-gitops

          git add .

          if git diff --cached --quiet; then
            echo "No changes detected."
            exit 0
          fi

          git commit -m "Update image tag to ${{ github.run_number }}"

          git push